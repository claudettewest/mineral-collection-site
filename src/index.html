<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mineral database</title>
    <link rel="icon" href="/diamond.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="side-nav" aria-label="Primary navigation">
            <div class="side-nav-title">Mineral database</div>
            <nav>
                <button type="button" class="side-nav-item is-active" data-nav="dashboard">Dashboard</button>
                <button type="button" class="side-nav-item" data-nav="collection">Collection</button>
                <button type="button" class="side-nav-item" data-nav="add-specimen">Add Specimen</button>
                <button type="button" class="side-nav-item" data-nav="locations">Locations</button>
                <button type="button" class="side-nav-item">Search</button>
                <button type="button" class="side-nav-item" data-nav="ai-assistant">AI Assistant</button>
                <button type="button" class="side-nav-item settings-nav-item" data-nav="settings" aria-label="Settings" title="Settings">
                    <span class="settings-icon" aria-hidden="true">&#9881;</span>
                    <span class="settings-label">Settings</span>
                </button>
            </nav>
        </aside>
        <button type="button" class="nav-backdrop" data-role="nav-backdrop" aria-label="Close navigation"></button>
        <div class="app-content">
            <header>
                <button type="button" class="mobile-menu-button" data-role="mobile-menu" aria-label="Open navigation" aria-expanded="false">
                    <span aria-hidden="true">&#9662;</span>
                </button>
                <h1>Mineral database</h1>
            </header>
            <main>
                <section id="dashboard-container">
                    <div class="dashboard">
                        <div class="dashboard-header">
                            <h2>Dashboard</h2>
                        </div>
                        <div class="dashboard-metrics">
                            <article class="metric-card">
                                <span>Total Specimens</span>
                                <strong data-dashboard="total-specimens">0</strong>
                            </article>
                            <article class="metric-card">
                                <span>Locations</span>
                                <strong data-dashboard="locations">0</strong>
                            </article>
                            <article class="metric-card">
                                <span>Photos</span>
                                <strong data-dashboard="photos">0</strong>
                            </article>
                        </div>
                        <div class="dashboard-chart-panel">
                            <h3>Specimens by Type</h3>
                            <div class="type-chart-layout">
                                <div class="type-pie" data-dashboard="type-pie" role="img" aria-label="Specimens by type pie chart"></div>
                                <div class="type-legend" data-dashboard="type-legend"></div>
                            </div>
                        </div>
                    </div>
                </section>
                <section id="form-container" style="display:none;"></section>
                <section id="upload-container" style="display:none;"></section>
                <section id="list-container" style="display:none;"></section>
                <section id="gemma-container" style="display:none;"></section>
                <section id="locations-container" style="display:none;">
                    <div class="locations-page">
                        <h2>Locations</h2>
                        <div class="continent-icon-grid" aria-label="Specimens by continent">
                            <article class="continent-icon-card">
                                <img src="/maps/north_america.png" alt="North America">
                                <span>North America</span>
                                <strong data-continent-count="North America">0</strong>
                            </article>
                            <article class="continent-icon-card">
                                <img src="/maps/south_america.png" alt="South America">
                                <span>South America</span>
                                <strong data-continent-count="South America">0</strong>
                            </article>
                            <article class="continent-icon-card">
                                <img src="/maps/europe.png" alt="Europe">
                                <span>Europe</span>
                                <strong data-continent-count="Europe">0</strong>
                            </article>
                            <article class="continent-icon-card">
                                <img src="/maps/africa.png" alt="Africa">
                                <span>Africa</span>
                                <strong data-continent-count="Africa">0</strong>
                            </article>
                            <article class="continent-icon-card">
                                <img src="/maps/asia.png" alt="Asia">
                                <span>Asia</span>
                                <strong data-continent-count="Asia">0</strong>
                            </article>
                            <article class="continent-icon-card">
                                <img src="/maps/oceania.png" alt="Oceania">
                                <span>Oceania</span>
                                <strong data-continent-count="Oceania">0</strong>
                            </article>
                        </div>
                        <div class="continent-summary" data-role="continent-summary"></div>
                    </div>
                </section>
                <section id="settings-container" style="display:none;">
                    <div class="settings-page">
                        <h2>Settings</h2>
                        <div class="settings-panel">
                            <span>Theme</span>
                            <div class="theme-toggle" role="group" aria-label="Theme">
                                <button type="button" data-theme-option="dark">Dark</button>
                                <button type="button" data-theme-option="light">Light</button>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script src="components/mineral-form.js"></script>
    <script src="components/mineral-list.js"></script>
    <script src="components/upload-form.js"></script>
    <script src="components/gemma-assistant.js"></script>
    <script src="app.js"></script>
</body>
</html>
