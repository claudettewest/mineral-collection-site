            - SO4
            - SO3
            - AsO4
            - AsO3
            - VO4
            - CrO4
            - SeO4
            - SeO3
            - MoO4
            - SnOH
            - SbO4
            - SbO3
            - TeO4
            - TeO3
            - IO3
            - WO4
            - UO2
            - SiO4
            - SiO3
            - Si3O9
            - CH3COO
            - HCOO
            - C2O4
        description: Include minerals containing these elements and ions, comma separated.
        explode: false
        style: form
      - in: query
        name: entrytype
        schema:
          type: array
          items:
            type: integer
            enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
            - 8
        description: 'Entry type. Multiple choice. Values: </br> <pre style=''white-space:
          pre-wrap;''>0 - <b>mineral</b> </br>1 - <b>synonym</b> </br>2 - <b>variety</b>
          </br>3 - <b>mixture</b> </br>4 - <b>series</b> </br>5 - <b>grouplist</b>
          </br>6 - <b>polytype</b> </br>7 - <b>rock</b> </br>8 - <b>commodity</b>
          </br></pre>'
        explode: true
        style: form
      - name: expand
        required: false
        in: query
        description: Select fields to expand
        style: form
        explode: false
        schema:
          title: Expanded fields
          type: array
          items:
            type: string
            enum:
            - description
            - type_localities
            - locality
            - relations
            - minstats
            - ~all
            - '*'
      - name: fields
        required: false
        in: query
        description: Specify required fields by comma
        schema:
          title: Selected fields
          type: string
        example: id,longid,guid,name,updttime,mindat_formula,mindat_formula_note,ima_formula,ima_status,ima_notes,varietyof,synid,polytypeof,groupid,entrytype,entrytype_text,description_short,impurities,elements,sigelements,tlform,cim,occurrence,otheroccurrence,industrial,discovery_year,diapheny,cleavage,parting,tenacity,colour,csmetamict,opticalextinction,hmin,hardtype,hmax,vhnmin,vhnmax,vhnerror,vhng,vhns,luminescence,lustre,lustretype,aboutname,other,streak,csystem,cclass,spacegroup,a,b,c,alpha,beta,gamma,aerror,berror,cerror,alphaerror,betaerror,gammaerror,va3,z,dmeas,dmeas2,dcalc,dmeaserror,dcalcerror,cleavagetype,fracturetype,morphology,twinning,epitaxidescription,opticaltype,opticalsign,opticalalpha,opticalbeta,opticalgamma,opticalomega,opticalepsilon,opticalalpha2,opticalbeta2,opticalgamma2,opticalepsilon2,opticalomega2,opticaln,opticaln2,optical2vcalc,optical2vmeasured,optical2vcalc2,optical2vmeasured2,opticalalphaerror,opticalbetaerror,opticalgammaerror,opticalomegaerror,opticalepsilonerror,opticalnerror,optical2vcalcerror,optical2vmeasurederror,opticaldispersion,opticalpleochroism,opticalpleochorismdesc,opticalbirefringence,opticalcomments,opticalcolour,opticalinternal,opticaltropic,opticalanisotropism,opticalbireflectance,opticalr,uv,ir,magnetism,type_specimen_store,commenthard,cim,strunz10ed1,strunz10ed2,strunz10ed3,strunz10ed4,dana8ed1,dana8ed2,dana8ed3,dana8ed4,thermalbehaviour,commentluster,commentbreak,commentdense,commentcrystal,commentcolor,electrical,tranglide,nolocadd,specdispm,spacegroupset,approval_year,publication_year,ima_history,rock_parent,rock_parent2,rock_root,rock_bgs_code,meteoritical_code,key_elements,shortcode_ima,rimin,rimax,weighting,~all,*
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: query
        name: fracturetype
        schema:
          type: array
          items:
            type: string
            nullable: true
            enum:
            - Conchoidal
            - Fibrous
            - Hackly
            - Irregular/Uneven
            - Micaceous
            - None observed
            - Splintery
            - Step-Like
            - Sub-Conchoidal
        description: 'Fracture: multiple choice (AND)'
        explode: true
        style: form
      - in: query
        name: groupid
        schema:
          type: integer
      - in: query
        name: hardness_max
        schema:
          type: number
          format: float
        description: Mohs hardness to (hmin<=)
      - in: query
        name: hardness_min
        schema:
          type: number
          format: float
        description: Mohs hardness from (hmax>=)
      - in: query
        name: id_in
        schema:
          type: array
          items:
            type: integer
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - in: query
        name: id_max
        schema:
          type: integer
        description: 'ID range. Format: ?id_min=...&id_max=...'
      - in: query
        name: id_min
        schema:
          type: integer
        description: 'ID range. Format: ?id_min=...&id_max=...'
      - in: query
        name: ima
        schema:
          type: boolean
        description: Include IMA-approved names only (true) / exclude IMA-approved
          (false)
      - in: query
        name: ima_notes
        schema:
          type: array
          items:
            type: integer
            maximum: 9223372036854775807
            minimum: -9223372036854775808
            format: int64
            nullable: true
            enum:
            - GROUP
            - INTERMEDIATE
            - NAMED_AMPHIBOLE
            - PENDING_APPROVAL
            - PUBLISHED_WITHOUT_APPROVAL
            - REDEFINED
            - REJECTED
            - RENAMED
            - UNNAMED_INVALID
            - UNNAMED_VALID
        description: 'Ima notes: multiple choice (OR)'
        explode: true
        style: form
      - in: query
        name: ima_status
        schema:
          type: array
          items:
            type: integer
            maximum: 9223372036854775807
            minimum: -9223372036854775808
            format: int64
            nullable: true
            enum:
            - APPROVED
            - DISCREDITED
            - GRANDFATHERED
            - PENDING_PUBLICATION
            - QUESTIONABLE
        description: 'Ima status: multiple choice (OR)'
        explode: true
        style: form
      - in: query
        name: lustretype
        schema:
          type: array
          items:
            type: string
            nullable: true
            enum:
            - Adamantine
            - Dull
            - Earthy
            - Greasy
            - Metallic
            - Pearly
            - Resinous
            - Silky
            - Sub-Adamantine
            - Sub-Metallic
            - Sub-Vitreous
            - Vitreous
            - Waxy
        description: 'Lustretype: multiple choice (AND)'
        explode: true
        style: form
      - in: query
        name: meteoritical_code
        schema:
          type: string
        description: Meteoritical code. Text search supporting * and _ as wildcards
      - in: query
        name: meteoritical_code_exists
        schema:
          type: boolean
        description: Meteoritical code exists. Include non-empty (true) / include
          empty only (false)
      - in: query
        name: name
        schema:
          type: string
        description: 'Name. Text search supporting * and _ as wildcards, e.g. "qu_rtz",
          "bario*" '
      - in: query
        name: non_utf
        schema:
          type: boolean
        description: Include non-UTF mineral names?
      - name: omit
        required: false
        in: query
        description: Specify omitted fields by comma
        schema:
          title: Omitted fields
          type: string
        example: id,longid,guid,name,updttime,mindat_formula,mindat_formula_note,ima_formula,ima_status,ima_notes,varietyof,synid,polytypeof,groupid,entrytype,entrytype_text,description_short,impurities,elements,sigelements,tlform,cim,occurrence,otheroccurrence,industrial,discovery_year,diapheny,cleavage,parting,tenacity,colour,csmetamict,opticalextinction,hmin,hardtype,hmax,vhnmin,vhnmax,vhnerror,vhng,vhns,luminescence,lustre,lustretype,aboutname,other,streak,csystem,cclass,spacegroup,a,b,c,alpha,beta,gamma,aerror,berror,cerror,alphaerror,betaerror,gammaerror,va3,z,dmeas,dmeas2,dcalc,dmeaserror,dcalcerror,cleavagetype,fracturetype,morphology,twinning,epitaxidescription,opticaltype,opticalsign,opticalalpha,opticalbeta,opticalgamma,opticalomega,opticalepsilon,opticalalpha2,opticalbeta2,opticalgamma2,opticalepsilon2,opticalomega2,opticaln,opticaln2,optical2vcalc,optical2vmeasured,optical2vcalc2,optical2vmeasured2,opticalalphaerror,opticalbetaerror,opticalgammaerror,opticalomegaerror,opticalepsilonerror,opticalnerror,optical2vcalcerror,optical2vmeasurederror,opticaldispersion,opticalpleochroism,opticalpleochorismdesc,opticalbirefringence,opticalcomments,opticalcolour,opticalinternal,opticaltropic,opticalanisotropism,opticalbireflectance,opticalr,uv,ir,magnetism,type_specimen_store,commenthard,cim,strunz10ed1,strunz10ed2,strunz10ed3,strunz10ed4,dana8ed1,dana8ed2,dana8ed3,dana8ed4,thermalbehaviour,commentluster,commentbreak,commentdense,commentcrystal,commentcolor,electrical,tranglide,nolocadd,specdispm,spacegroupset,approval_year,publication_year,ima_history,rock_parent,rock_parent2,rock_root,rock_bgs_code,meteoritical_code,key_elements,shortcode_ima,rimin,rimax,weighting,~all,*
      - in: query
        name: optical2v_max
        schema:
          type: string
        description: '2V. Range: optical2v_min - optical2v_max'
      - in: query
        name: optical2v_min
        schema:
          type: string
        description: '2V. Range: optical2v_min - optical2v_max'
      - in: query
        name: opticalsign
        schema:
          type: string
          nullable: true
          enum:
          - +
          - +/-
          - '-'
        description: 'Optical sign: single choice'
      - in: query
        name: opticaltype
        schema:
          type: string
          nullable: true
          enum:
          - Biaxial
          - Isotropic
          - Uniaxial
        description: 'Optical type: single choice'
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - approval_year
          - id
          - minstats__ms_locentries
          - minstats__ms_photos
          - name
          - updttime
          - weighting
        description: Order the response by a field. Prepend "-" to the field name
          for descending order.
        examples:
          SortByIdDescending_:
            value: -id
            summary: 'sort by id descending '
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page-size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: polytypeof
        schema:
          type: integer
      - name: q
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: ri_max
        schema:
          type: number
          format: float
        description: Refractive index, to (rimin<=)
      - in: query
        name: ri_min
        schema:
          type: number
          format: float
        description: Refractive index, from (rimax>=)
      - in: query
        name: streak
        schema:
          type: string
      - in: query
        name: synid
        schema:
          type: integer
      - in: query
        name: tenacity
        schema:
          type: array
          items:
            type: string
            nullable: true
            enum:
            - brittle
            - elastic
            - flexible
            - fragile
            - malleable
            - sectile
            - very brittle
            - waxy
        description: 'Tenacity: multiple choice (AND)'
        explode: true
        style: form
      - in: query
        name: updated_at
        schema:
          type: string
          format: date-time
        description: Last updated datetime in format %Y-%m-%d %H:%M:%S
      - in: query
        name: varietyof
        schema:
          type: integer
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
