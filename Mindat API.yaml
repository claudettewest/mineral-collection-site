openapi: 3.0.3
info:
  title: Mindat API
  version: 1.0.0
  description: Mindat API
paths:
  /crystalclasses/:
    get:
      operationId: crystalclasses_list
      description: Crystal class dictionary
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: query
        name: id_in
        schema:
          type: array
          items:
            type: integer
        description: Filter by a list of Crystalclass IDs (comma separated).
        explode: false
        style: form
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page-size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: symbol
        schema:
          type: string
        description: Filter by symbol (case-insensitive).
      - in: query
        name: system
        schema:
          type: string
        description: Filter by crystal system (case-insensitive).
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCrystalclassList'
            text/csv:
              schema:
                $ref: '#/components/schemas/PaginatedCrystalclassList'
          description: ''
  /crystalclasses/{id}/:
    get:
      operationId: crystalclasses_retrieve
      description: Crystal class dictionary
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this crystalclass.
        required: true
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Crystalclass'
            text/csv:
              schema:
                $ref: '#/components/schemas/Crystalclass'
          description: ''
  /dana-8/:
    get:
      operationId: dana_8_retrieve
      description: Disabling default list view, because we are using 'groups' action.
      tags:
      - Geomaterials classifications
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /dana-8/{idtemp}/:
    get:
      operationId: dana_8_retrieve_2
      description: Endpoint allows Dana 8th edition classifications to be viewed and
        filtered.
      parameters:
      - in: path
        name: idtemp
        schema:
          type: integer
        description: A unique integer value identifying this dana1.
        required: true
      tags:
      - Geomaterials classifications
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /dana-8/groups/:
    get:
      operationId: dana_8_groups_retrieve
      description: Endpoint allows Dana 8th edition classifications to be viewed and
        filtered.
      tags:
      - Geomaterials classifications
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /dana-8/subgroups/:
    get:
      operationId: dana_8_subgroups_retrieve
      description: Endpoint allows Dana 8th edition classifications to be viewed and
        filtered.
      tags:
      - Geomaterials classifications
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          description: No response body
  /exports/:
    get:
      operationId: export_files_list
      description: "\n    Returns a list of pre-generated CSV and JSON files,\n  \
        \  which contain the entire data from the API endpoints, along with metadata\
        \ about each file, including download URLs.\n    These files can be downloaded\
        \ directly to extract the full data from the API endpoints without overloading\
        \ the database with queries.\n    Any additional records added after the date\
        \ specified in 'date_to' can be downloaded from the Mindat API in the same\
        \ format.\n    "
      tags:
      - Exports
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  csv:
                    type: array
                    items:
                      type: object
                      properties:
                        endpoint:
                          type: string
                        time_from:
                          type: string
                          format: date-time
                        time_to:
                          type: string
                          format: date-time
                        size:
                          type: string
                        url:
                          type: string
                          format: uri
                  json:
                    type: array
                    items:
                      type: object
                      properties:
                        endpoint:
                          type: string
                        time_from:
                          type: string
                          format: date-time
                        time_to:
                          type: string
                          format: date-time
                        size:
                          type: string
                        url:
                          type: string
                          format: uri
          description: Returns a list of files for CSV and JSON formats, with metadata
            about each file, including download URLs.
        '400':
          description: Invalid request data.
  /geoloc-point/:
    post:
      operationId: geoloc_point_search
      description: "\n    Returns all localities within the given distance from the\
        \ point.\n    Example request:\n        {\n          \"point\": {\n      \
        \      \"lat\": 44.230011,\n            \"lon\": 39.807471\n          },\n\
        \          \"distance\": \"10km\",\n          \"description\": \"Sample description\"\
        ,\n          \"txtfull\": \"Detailed text\"\n        }\n    "
      tags:
      - Localities
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
          description: A list of locality IDs matching the polygon search.
        '400':
          description: Invalid request data.
  /geoloc-poly/:
    post:
      operationId: geoloc_poly_search
      description: "\n    Returns all localities within the given polygon\n    Example\
        \ request:\n        {\n          \"polygon\": {\n            \"type\": \"\
        Polygon\",\n            \"coordinates\": [\n              [\n            \
        \    [39.807471, 44.230011],\n                [40.134314, 43.975584],\n  \
        \              [40.664404, 44.196544],\n                [40.334814, 44.481382],\n\
        \                [39.807471, 44.230011]\n              ]\n            ]\n\
        \          },\n          \"description\": \"Sample description\",\n      \
        \    \"txtfull\": \"Detailed text\"\n        }\n    "
      tags:
      - Localities
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
          description: A list of locality IDs matching the polygon search.
        '400':
          description: Invalid request data.
  /geomaterials/:
    get:
      operationId: geomaterials_list
      description: |-
        The main endpoint for geomaterials table. List or retrieve Mindat geomaterials (minerals, groups, varieties, polytypes, synonyms, rocks, commodities, etc.)
        The main view for minerals or other geomaterials. * Requires token or login authentication.
      parameters:
      - in: query
        name: bi_max
        schema:
          type: string
        description: 'Birifrigence. Range: bi_min - bi_max. Birifrigence is calculated
          from refractive index as (rimax-rimin)'
      - in: query
        name: bi_min
        schema:
          type: string
        description: 'Birifrigence. Range: bi_min - bi_max. Birifrigence is calculated
          from refractive index as (rimax-rimin)'
      - in: query
        name: cleavagetype
        schema:
          type: array
          items:
            type: string
            nullable: true
            enum:
            - Distinct/Good
            - Imperfect/Fair
            - None Observed
            - Perfect
            - Poor/Indistinct
            - Very Good
        description: 'Cleavage: multiple choice'
        explode: true
        style: form
      - in: query
        name: colour
        schema:
          type: string
      - in: query
        name: crystal_system
        schema:
          type: array
          items:
            type: string
            nullable: true
            enum:
            - Amorphous
            - Hexagonal
            - Icosahedral
            - Isometric
            - Monoclinic
            - Orthorhombic
            - Tetragonal
            - Triclinic
            - Trigonal
        description: 'Crystal system (csystem): multiple choice (OR)'
        explode: true
        style: form
      - in: query
        name: density_max
        schema:
          type: number
        description: Density measured, to (dmeas<=)
      - in: query
        name: density_min
        schema:
          type: number
        description: Density measured, from (dmeas2>=)
      - in: query
        name: diapheny
        schema:
          type: array
          items:
            type: string
            nullable: true
            enum:
            - Opaque
            - Translucent
            - Transparent
        description: 'Diapheny (transparency): multiple choice (AND)'
        explode: true
        style: form
      - in: query
        name: el_essential
        schema:
          type: boolean
        description: 'Chemsearch: include essential elements only?'
      - in: query
        name: el_exc
        schema:
          type: array
          items:
            type: string
            enum:
            - H
            - Li
            - Be
            - B
            - C
