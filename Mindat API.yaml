components:
  schemas:
    Age:
      type: object
      description: to display -null- values as -empty string-
      properties:
        age_id:
          type: integer
          readOnly: true
        age_mav:
          type: number
          format: double
        age_pmv:
          type: number
          format: double
        age_ma2v:
          type: number
          format: double
        age_pm2v:
          type: number
          format: double
        agemethod:
          type: string
          maxLength: 255
        agereference:
          type: string
          maxLength: 255
        age_ma:
          type: string
          maxLength: 32
        age_pm:
          type: string
          maxLength: 32
        age_ma2:
          type: string
          maxLength: 32
        age_pm2:
          type: string
          maxLength: 32
        ages1:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        ages2:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        age_type:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
      required:
      - age_id
      - age_ma
      - age_ma2
      - age_ma2v
      - age_mav
      - age_pm
      - age_pm2
      - age_pm2v
      - age_pmv
      - age_type
      - agemethod
      - agereference
      - ages1
      - ages2
    BlankEnum:
      enum:
      - ''
    CleavagetypeEnum:
      enum:
      - None Observed
      - Poor/Indistinct
      - Imperfect/Fair
      - Distinct/Good
      - Very Good
      - Perfect
      type: string
    Crystalclass:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        system:
          type: string
          description: The crystal system.
          maxLength: 12
        symbol:
          type: string
          description: The symmetry symbol for the crystal class.
          maxLength: 32
        name:
          type: string
          description: The name of the crystal class.
          maxLength: 128
      required:
      - id
      - name
      - symbol
      - system
    CsystemEnum:
      enum:
      - Isometric
      - Orthorhombic
      - Hexagonal
      - Trigonal
      - Tetragonal
      - Monoclinic
      - Triclinic
      - Amorphous
      - Icosahedral
      type: string
    Ddc:
      type: object
      description: to display -null- values as -empty string-
      properties:
        ddc_code:
          type: string
          maxLength: 255
        ddc_title:
          type: string
          maxLength: 255
      required:
      - ddc_code
      - ddc_title
    DiaphenyEnum:
      enum:
      - Transparent
      - Translucent
      - Opaque
      type: string
    EntrytypeEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      type: integer
    FracturetypeEnum:
      enum:
      - None observed
      - Irregular/Uneven
      - Splintery
      - Hackly
      - Conchoidal
      - Sub-Conchoidal
      - Fibrous
      - Micaceous
      - Step-Like
      type: string
