  /geomaterials-search/:
    get:
      operationId: geomaterials_search_list
      description: "\n    Returns geomaterials (minerals, etc.) where name contains\
        \ search term.\n    If exact match is not found, applies fuzzy search returning\
        \ names with the least levenshtein distance.\n    The fuzzy search algorythm\
        \ is identical to the search for minerals on Mindat front page.\n    "
      parameters:
      - in: query
        name: e
        schema:
          type: integer
        description: Exact. If 1 returns only exact matech
      - in: query
        name: ima
        schema:
          type: integer
        description: if 1, returns only ima-approved minerals
      - in: query
        name: q
        schema:
          type: string
        description: Search term
        required: true
      - in: query
        name: size
        schema:
          type: integer
        description: Limit of returned records, applicable only if fuzzy search applies,
          default is 12
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    ima_status:
                      type: string
                    synid:
                      type: integer
          description: A list of minerals matching the search criteria, including
            their id, name, ima_status, and synonym id.
        '400':
          description: Missing callsign
  /geomaterials/{id}/:
    get:
      operationId: geomaterials_retrieve
      description: |-
        The main endpoint for geomaterials table. List or retrieve Mindat geomaterials (minerals, groups, varieties, polytypes, synonyms, rocks, commodities, etc.)
        The main view for minerals or other geomaterials. * Requires token or login authentication.
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this minerals.
        required: true
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MineralList'
            text/csv:
              schema:
                $ref: '#/components/schemas/MineralList'
          description: ''
  /geomaterials/{id}/varieties/:
    get:
      operationId: geomaterials_varieties_retrieve
      description: Action for retrieving the varieties of a specific geomaterial
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this minerals.
        required: true
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MineralList'
            text/csv:
              schema:
                $ref: '#/components/schemas/MineralList'
          description: ''
  /geomaterials/dict/:
    get:
      operationId: geomaterials_dict_retrieve
      description: Action for displaying a dictionary of values for a field
      parameters:
      - in: query
        name: field
        schema:
          type: string
          enum:
          - cleavagetype
          - csystem
          - diapheny
          - fracturetype
          - lustretype
          - magnetism
          - opticalpleochroism
          - opticalsign
          - opticaltropic
          - opticaltype
          - relationship
          - tenacity
        description: Field name for which to return dictionary of values.
        required: true
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
            text/csv:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /geomin-point/:
    post:
      operationId: geomin_point_search
      description: "\n    Returns all minerals found at localities within the given\
        \ distance from the point.\n    Example request:\n        {\n          \"\
        point\": {\n            \"lat\": 44.230011,\n            \"lon\": 39.807471\n\
        \          },\n          \"distance\": \"10km\",\n          \"description\"\
        : \"Sample description\",\n          \"txtfull\": \"Detailed text\"\n    \
        \    }\n    "
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
          description: A list of mineral IDs found at localities within the given
            distance from the point.
        '400':
          description: Invalid request data.
  /geomin-poly/:
    post:
      operationId: geomin_poly_search
      description: "\n    Returns all minerals found at localities matching the polygon\
        \ search.\n    Example request:\n        {\n          \"polygon\": {\n   \
        \         \"type\": \"Polygon\",\n            \"coordinates\": [\n       \
        \       [\n                [39.807471, 44.230011],\n                [40.134314,\
        \ 43.975584],\n                [40.664404, 44.196544],\n                [40.334814,\
        \ 44.481382],\n                [39.807471, 44.230011]\n              ]\n \
        \           ]\n          },\n          \"description\": \"Sample description\"\
        ,\n          \"txtfull\": \"Detailed text\"\n        }\n    "
      tags:
      - Geomaterials
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
          description: A list of mineral IDs found at localities matching the polygon
            search.
        '400':
          description: Invalid request data.
  /loc-by-min/:
    get:
      operationId: loc_by_min_search
      description: "\n    Returns a list of locality IDs that:\n    - Contain all\
        \ minerals in 'inc' (including varieties).\n    - Do NOT contain any minerals\
        \ in 'exc' (including varieties).\n    "
      parameters:
      - in: query
        name: exc
        schema:
          type: integer
        description: geomaterials that MUST NOT be present at searched locality, comma
          separated
      - in: query
        name: inc
        schema:
          type: integer
        description: geomaterials that MUST be present at searched locality, comma
          separated
        required: true
      tags:
      - Localities
      security:
      - tokenAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
          description: A list of locality IDs matching search.
        '400':
          description: Missing callsign
